<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <style>
        body {
            background-color: #4B0082; /* Dark Purple */
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .hero {
            text-align: center;
            padding: 100px 20px;
        }
        .hero h1 {
            font-size: 48px;
            margin: 0;
        }
        .featured {
            display: flex;
            justify-content: space-around;
            padding: 50px 0;
        }
        .card {
            background-color: #6A0AD0;
            border-radius: 10px;
            padding: 20px;
            width: 30%;
            text-align: center;
        }
        .stats {
            text-align: center;
            padding: 50px 20px;
        }
        .cta {
            text-align: center;
            padding: 50px 20px;
            background-color: #8A2BE2;
        }
        .cta button {
            background-color: white;
            color: #4B0082;
            border: none;
            border-radius: 5px;
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Welcome to Our Modern Home Page</h1>
        <p>Your one-stop destination for everything!</p>
    </div>
    <div class="featured">
        <div class="card">
            <h2>Feature 1</h2>
            <p>Description of feature 1.</p>
        </div>
        <div class="card">
            <h2>Feature 2</h2>
            <p>Description of feature 2.</p>
        </div>
        <div class="card">
            <h2>Feature 3</h2>
            <p>Description of feature 3.</p>
        </div>
    </div>
    <div class="stats">
        <h2>Statistics</h2>
        <p>Some interesting statistics about our services.</p>
    </div>
    <div class="cta">
        <h2>Get Started Now!</h2>
        <button>Join Us</button>
    </div>
</body>
</html>
